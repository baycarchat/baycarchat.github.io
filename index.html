<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BaycarChat PRO</title>

<style>
:root{
  --bg:#0f0f0f;
  --glass:rgba(255,255,255,0.08);
}

body{
  margin:0;
  background:var(--bg);
  color:#fff;
  font-family:sans-serif;
}

#app{display:flex;flex-direction:column;height:100vh}

#chat{flex:1;overflow:auto;padding:10px}

.msg{
  padding:10px;
  border-radius:12px;
  margin:5px;
  background:#1e1e1e;
}

.me{background:#2a6df5}

#bar{
  display:flex;
  padding:10px;
  backdrop-filter:blur(20px);
  background:var(--glass);
}

input{flex:1;padding:10px}

.nav{
  display:flex;
  justify-content:space-around;
  padding:10px;
  backdrop-filter:blur(20px);
  background:var(--glass);
}
</style>
</head>

<body>
<div id="app">

<div id="chat"></div>

<div id="bar">
  <input id="msg">
  <button onclick="send()">送</button>
  <button onclick="upload()">📷</button>
  <button onclick="record()">🎤</button>
</div>

<div class="nav">
  <div onclick="page('chat')">💬</div>
  <div onclick="page('notify')">🔔</div>
  <div onclick="page('home')">🏠</div>
  <div onclick="page('me')">👤</div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzCmufxZUmQMOYRb76OO5XggYHejV0mD2VIi-ohsG4i-JXmLJ7FxJwQKyDeDFwfgyQ4lQ/exec";

let user=localStorage.user || ("U"+Date.now());
localStorage.user=user;

let last=0;

// API
async function api(d){
  return fetch(API,{
    method:"POST",
    body:JSON.stringify(d)
  }).then(r=>r.json());
}

// 發送
async function send(){
  const t=msg.value;
  const r=await api({a:"send",from:user,to:"global",content:t,type:"text"});
  last=r.id;
  msg.value="";
}

// Poll（增量）
async function poll(){
  const r=await api({a:"poll",last:last});

  r.msg.forEach(m=>{
    render(m);
    last=m[0];
  });
}

// render
function render(m){
  const d=document.createElement("div");
  d.className="msg"+(m[1]==user?" me":"");

  if(m[4]=="img"){
    d.innerHTML=`<img src="${m[3]}" width="150">`;
  }else if(m[4]=="audio"){
    d.innerHTML=`<audio controls src="${m[3]}"></audio>`;
  }else{
    d.innerText=m[1]+": "+m[3];
  }

  chat.appendChild(d);
}

// 圖片
async function upload(){
  const i=document.createElement("input");
  i.type="file";
  i.onchange=async()=>{
    const f=i.files[0];
    const b64=await toBase64(f);

    const u=await api({
      a:"upload",
      b64:b64.split(",")[1],
      type:f.type,
      name:f.name
    });

    await api({a:"send",from:user,to:"global",content:u.url,type:"img"});
  };
  i.click();
}

// 錄音
let rec,chunks=[];
async function record(){
  const s=await navigator.mediaDevices.getUserMedia({audio:true});
  rec=new MediaRecorder(s);

  rec.ondataavailable=e=>chunks.push(e.data);
  rec.onstop=async()=>{
    const blob=new Blob(chunks);
    const b64=await toBase64(blob);

    const u=await api({
      a:"upload",
      b64:b64.split(",")[1],
      type:"audio/webm",
      name:"rec.webm"
    });

    await api({a:"send",from:user,to:"global",content:u.url,type:"audio"});
    chunks=[];
  };

  rec.start();
  setTimeout(()=>rec.stop(),60000);
}

// base64
function toBase64(f){
  return new Promise(r=>{
    const fr=new FileReader();
    fr.onload=()=>r(fr.result);
    fr.readAsDataURL(f);
  });
}

// 主題
function theme(c){
  document.documentElement.style.setProperty("--bg",c);
}

// 輪詢
setInterval(poll,3000);
setInterval(()=>api({a:"online",user:user}),5000);

</script>
</body>
</html>
