<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BayCarChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#3b82f6', darkbg: '#0f172a' }
                }
            }
        }
    </script>
    <style>
        /* 液態玻璃效果 */
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .dark .glass {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .nav-glass {
            border-radius: 40px;
        }

        /* 隱藏捲軸但可捲動 */
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        body { 
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        .toast-enter {
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes slideDown {
            from { top: -50px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-darkbg text-gray-900 dark:text-gray-100 h-screen w-screen flex flex-col antialiased">

    <!-- 全域 Toast 通知 -->
    <div id="toastContainer" class="fixed left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none w-[90%] max-w-[400px]"></div>

    <!-- 視圖容器 -->
    <div id="app" class="h-full w-full relative flex flex-col pb-20">
        <!-- 內容將由 JS 動態渲染 -->
    </div>

    <!-- 底部導覽列 (橢圓液態玻璃) -->
    <nav id="bottomNav" class="hidden fixed bottom-4 left-1/2 transform -translate-x-1/2 w-[90%] max-w-[400px] h-16 glass nav-glass flex justify-around items-center z-50 px-2 transition-all">
        <button onclick="switchView('home')" class="nav-btn p-3 rounded-full text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-primary transition-colors" data-view="home"><i class="ph ph-house text-2xl"></i></button>
        <button onclick="switchView('search')" class="nav-btn p-3 rounded-full text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-primary transition-colors" data-view="search"><i class="ph ph-magnifying-glass text-2xl"></i></button>
        <button onclick="switchView('chatlist')" class="nav-btn p-3 rounded-full text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-primary transition-colors relative" data-view="chatlist">
            <i class="ph ph-chat-circle-dots text-2xl"></i>
            <span id="msgBadge" class="hidden absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
        <button onclick="switchView('profile')" class="nav-btn p-3 rounded-full text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-primary transition-colors" data-view="profile"><i class="ph ph-user text-2xl"></i></button>
    </nav>

<script>
    // ！！！請將下方網址替換為你的 GAS 網頁應用程式 URL！！！
    const API_URL = "https://script.google.com/macros/s/AKfycbxD4P2U6pxjn4rmAXozxATg9v-ydNhrLMV5TzYFaLPE6784biPqUU9-vMfQU93aEDKChA/exec"; 
    
    // 全域狀態
    const state = {
        user: null,
        currentView: 'login',
        chats: [],
        activeChat: null,
        lastSync: new Date(0).toISOString(),
        pollInterval: null,
        pollErrors: 0
    };

    // --- 工具函數 ---

    // 操作 Cookie & LocalStorage (狀態保持)
    function saveAuth(user) {
        state.user = user;
        localStorage.setItem('baycar_user', JSON.stringify(user));
        document.cookie = `baycar_uid=${user.id}; max-age=2592000; path=/`;
    }
    function loadAuth() {
        const u = localStorage.getItem('baycar_user');
        if (u) {
            state.user = JSON.parse(u);
            if(state.user.theme === 'light') document.documentElement.classList.remove('dark');
            return true;
        }
        return false;
    }
    function logout() {
        state.user = null;
        localStorage.removeItem('baycar_user');
        document.cookie = "baycar_uid=; max-age=0; path=/";
        switchView('login');
    }

    // API 呼叫包裝器
    async function api(action, payload = {}) {
        if (!API_URL.startsWith("http")) {
            showToast("請先在程式碼中填寫 API_URL", "error");
            return {status: "error"};
        }
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // GAS CORS workaround
                body: JSON.stringify({ action, payload })
            });
            return await res.json();
        } catch (e) {
            console.error("API Error:", e);
            return { status: "error", message: "網路錯誤" };
        }
    }

    // Toast 通知 (頂部橢圓)
    function showToast(message, type = "info") {
        const t = document.createElement('div');
        const truncMsg = message.length > 20 ? message.substring(0, 20) + '...' : message;
        t.className = `toast-enter glass rounded-full px-6 py-3 flex items-center shadow-lg text-sm font-medium ${type === 'error' ? 'text-red-500' : ''}`;
        t.innerHTML = `<i class="ph ph-bell-ringing mr-2 text-lg"></i><span>${truncMsg}</span>`;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(() => {
            t.style.opacity = '0';
            setTimeout(() => t.remove(), 300);
        }, 3000);
    }

    // 圖片壓縮與處理 (保留比例，高畫質 Canvas)
    function processImage(file, callback) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                let width = img.width;
                let height = img.height;
                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.8)); // 畫質可以
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // --- 視圖切換與渲染 ---

    function switchView(viewName, params = null) {
        state.currentView = viewName;
        const app = document.getElementById('app');
        const nav = document.getElementById('bottomNav');
        
        // 隱藏/顯示導覽列
        if (['login', 'register', 'chatroom'].includes(viewName)) {
            nav.classList.add('hidden');
        } else {
            nav.classList.remove('hidden');
            // 更新導覽列高亮
            document.querySelectorAll('.nav-btn').forEach(b => {
                if(b.dataset.view === viewName) {
                    b.classList.add('text-primary'); b.classList.remove('text-gray-500', 'dark:text-gray-400');
                } else {
                    b.classList.remove('text-primary'); b.classList.add('text-gray-500', 'dark:text-gray-400');
                }
            });
        }

        app.innerHTML = ''; // 清空

        switch (viewName) {
            case 'login': renderLogin(app); break;
            case 'register': renderRegister(app); break;
            case 'home': renderHome(app); break;
            case 'search': renderSearch(app); break;
            case 'chatlist': renderChatList(app); break;
            case 'profile': renderProfile(app, params?.userId || state.user.id); break;
            case 'chatroom': renderChatRoom(app, params?.chat); break;
            case 'settings': renderSettings(app); break;
        }
    }

    // 1. 登入畫面
    function renderLogin(container) {
        container.innerHTML = `
            <div class="flex flex-col items-center justify-center h-full px-6">
                <i class="ph-fill ph-chat-circle-text text-6xl text-primary mb-4"></i>
                <h1 class="text-3xl font-bold mb-8 tracking-wider">BayCarChat</h1>
                <div class="glass w-full max-w-sm p-8 rounded-3xl flex flex-col gap-4">
                    <input id="l_acc" type="text" placeholder="電子郵件或用戶名稱" class="w-full bg-transparent border-b border-gray-400 dark:border-gray-600 px-2 py-3 focus:outline-none focus:border-primary">
                    <input id="l_pwd" type="password" placeholder="密碼" class="w-full bg-transparent border-b border-gray-400 dark:border-gray-600 px-2 py-3 focus:outline-none focus:border-primary">
                    <button onclick="doLogin()" class="w-full bg-primary text-white rounded-full py-3 mt-4 font-bold shadow-lg shadow-blue-500/30">登入</button>
                    <p class="text-center text-sm mt-4 cursor-pointer text-gray-500 hover:text-primary" onclick="switchView('register')">沒有帳號？立即註冊</p>
                </div>
            </div>
        `;
    }

    async function doLogin() {
        const acc = document.getElementById('l_acc').value;
        const pwd = document.getElementById('l_pwd').value;
        if(!acc || !pwd) return showToast("請填寫完整資訊", "error");
        
        showToast("登入中...");
        const res = await api('login', { account: acc, password: pwd });
        if(res.status === 'success') {
            saveAuth(res.user);
            switchView('home');
            startPolling();
        } else {
            showToast(res.message, "error");
        }
    }

    // 2. 註冊畫面
    function renderRegister(container) {
        // 隨機數字驗證 (不扭曲)
        const captchaNum = Math.floor(1000 + Math.random() * 9000);
        
        container.innerHTML = `
            <div class="flex flex-col items-center h-full px-6 py-10 overflow-y-auto">
                <h1 class="text-2xl font-bold mb-6">建立新帳號</h1>
                <div class="glass w-full max-w-sm p-6 rounded-3xl flex flex-col gap-4">
                    <div class="flex justify-center mb-2">
                        <label class="cursor-pointer relative">
                            <img id="r_avatar_preview" src="https://ui-avatars.com/api/?name=New" class="w-20 h-20 rounded-full object-cover border-2 border-primary">
                            <div class="absolute bottom-0 right-0 bg-primary text-white rounded-full p-1"><i class="ph ph-camera"></i></div>
                            <input type="file" id="r_avatar" class="hidden" accept="image/*" onchange="previewAvatar(this)">
                        </label>
                    </div>
                    <input id="r_email" type="email" placeholder="電子郵件 (例: abc@email.com)" class="bg-transparent border-b border-gray-500 px-2 py-2 focus:outline-none">
                    <input id="r_realname" type="text" placeholder="本名 (例: 賴家豪)" class="bg-transparent border-b border-gray-500 px-2 py-2 focus:outline-none">
                    <input id="r_nickname" type="text" placeholder="暱稱 (例: 小賴賴)" class="bg-transparent border-b border-gray-500 px-2 py-2 focus:outline-none">
                    <input id="r_username" type="text" placeholder="用戶名稱 (例: small0966)" class="bg-transparent border-b border-gray-500 px-2 py-2 focus:outline-none">
                    <input id="r_pwd" type="password" placeholder="密碼" class="bg-transparent border-b border-gray-500 px-2 py-2 focus:outline-none">
                    
                    <div class="flex items-center gap-2 mt-2">
                        <span class="bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-lg font-mono text-lg tracking-widest">${captchaNum}</span>
                        <input id="r_captcha" type="text" placeholder="輸入驗證碼" data-ans="${captchaNum}" class="flex-1 bg-transparent border-b border-gray-500 px-2 py-2 focus:outline-none">
                    </div>

                    <button onclick="doRegister()" class="w-full bg-primary text-white rounded-full py-3 mt-4 font-bold">註冊</button>
                    <button onclick="switchView('login')" class="w-full bg-transparent text-gray-500 py-2">返回登入</button>
                </div>
            </div>
        `;
    }

    let tempAvatarBase64 = null;
    function previewAvatar(input) {
        if(input.files && input.files[0]) {
            processImage(input.files[0], (base64) => {
                document.getElementById('r_avatar_preview').src = base64;
                tempAvatarBase64 = base64;
            });
        }
    }

    async function doRegister() {
        const email = document.getElementById('r_email').value;
        const realName = document.getElementById('r_realname').value;
        const nickname = document.getElementById('r_nickname').value;
        const username = document.getElementById('r_username').value;
        const pwd = document.getElementById('r_pwd').value;
        const captcha = document.getElementById('r_captcha');

        if(!email || !realName || !nickname || !username || !pwd) return showToast("所有欄位必填", "error");
        if(captcha.value !== captcha.dataset.ans) return showToast("驗證碼錯誤", "error");

        showToast("註冊中，這可能需要幾秒鐘...");
        const res = await api('register', {
            email, realName, nickname, username, password: pwd, avatarBase64: tempAvatarBase64
        });

        if(res.status === 'success') {
            showToast("註冊成功！請登入");
            switchView('login');
        } else {
            showToast(res.message, "error");
        }
    }

    // 3. 首頁 (Home)
    async function renderHome(container) {
        container.innerHTML = `
            <div class="p-6">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-2 text-primary">
                        <i class="ph-fill ph-chat-circle-text text-3xl"></i>
                        <span class="text-xl font-bold">BayCarChat</span>
                    </div>
                    <button onclick="toggleTheme()" class="p-2 glass rounded-full"><i class="ph ph-moon"></i></button>
                </div>
                <h2 class="text-lg font-bold mb-4">推薦用戶</h2>
                <div id="homeUsers" class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 text-center text-gray-500">載入中...</div>
                </div>
            </div>
        `;
        
        const res = await api('getHomeUsers', { userId: state.user.id });
        const list = document.getElementById('homeUsers');
        if(res.status === 'success' && res.data.length > 0) {
            list.innerHTML = res.data.map(u => `
                <div class="glass p-4 rounded-2xl flex flex-col items-center text-center" onclick="switchView('profile', {userId: '${u.id}'})">
                    <img src="${u.avatar}" class="w-16 h-16 rounded-full mb-2 object-cover">
                    <p class="font-bold truncate w-full">${u.nickname}</p>
                    <p class="text-xs text-gray-500 truncate w-full">${u.bio || '尚未設定簡介'}</p>
                </div>
            `).join('');
        } else {
            list.innerHTML = `<p class="col-span-2 text-center text-gray-500">暫無推薦用戶</p>`;
        }
    }

    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        const theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        state.user.theme = theme;
        saveAuth(state.user);
        // 背景更新不需等後端，後台同步即可
        api('updateSettings', { userId: state.user.id, theme: theme });
    }

    // 4. 搜尋 (Search)
    function renderSearch(container) {
        container.innerHTML = `
            <div class="p-6 flex flex-col h-full">
                <div class="glass rounded-full px-4 py-2 flex items-center mb-6">
                    <i class="ph ph-magnifying-glass text-xl text-gray-400 mr-2"></i>
                    <input type="text" id="searchInput" placeholder="搜尋暱稱、本名、用戶名稱" class="bg-transparent border-none focus:outline-none w-full" oninput="debounceSearch()">
                </div>
                <div id="searchResults" class="flex-1 overflow-y-auto space-y-4">
                    <p class="text-center text-gray-500 mt-10">輸入關鍵字開始搜尋</p>
                </div>
            </div>
        `;
    }

    let searchTimeout;
    function debounceSearch() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
            const val = document.getElementById('searchInput').value;
            const resDiv = document.getElementById('searchResults');
            if(!val) { resDiv.innerHTML = ''; return; }
            
            resDiv.innerHTML = '<p class="text-center">搜尋中...</p>';
            const res = await api('searchUsers', { userId: state.user.id, keyword: val });
            
            if(res.status === 'success' && res.data.length > 0) {
                resDiv.innerHTML = res.data.map(u => `
                    <div class="glass p-3 rounded-2xl flex items-center gap-4 cursor-pointer" onclick="switchView('profile', {userId: '${u.id}'})">
                        <img src="${u.avatar}" class="w-12 h-12 rounded-full object-cover">
                        <div>
                            <p class="font-bold">${u.nickname}</p>
                            <p class="text-xs text-gray-500">@${u.username} • ${u.realName}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                resDiv.innerHTML = '<p class="text-center text-gray-500">找不到結果</p>';
            }
        }, 500);
    }

    // 5. 主頁 (Profile)
    async function renderProfile(container, targetId) {
        const isSelf = targetId === state.user.id;
        container.innerHTML = `
            <div class="p-6 relative">
                <button onclick="switchView('home')" class="absolute top-6 left-6 p-2 glass rounded-full z-10"><i class="ph ph-caret-left"></i></button>
                ${isSelf ? `<button onclick="switchView('settings')" class="absolute top-6 right-6 p-2 glass rounded-full z-10"><i class="ph ph-gear"></i></button>` : ''}
                
                <div id="profileContent" class="mt-16 flex flex-col items-center">
                    <div class="w-24 h-24 rounded-full bg-gray-300 animate-pulse mb-4"></div>
                </div>
            </div>
        `;

        const res = await api('getProfile', { targetId: targetId, userId: state.user.id });
        if(res.status === 'success') {
            const p = res.data;
            document.getElementById('profileContent').innerHTML = `
                <img src="${p.avatar}" class="w-24 h-24 rounded-full object-cover border-4 border-primary shadow-lg mb-4">
                <h2 class="text-2xl font-bold">${p.nickname}</h2>
                <p class="text-sm text-gray-500 mb-4">@${p.username}</p>
                <div class="flex gap-6 mb-6">
                    <div class="text-center"><p class="font-bold text-lg">${p.followers}</p><p class="text-xs text-gray-500">粉絲</p></div>
                    <div class="text-center"><p class="font-bold text-lg">${p.following}</p><p class="text-xs text-gray-500">關注</p></div>
                </div>
                <p class="text-center px-4 mb-6">${p.bio || '這個人很懶，什麼都沒留下。'}</p>
                
                ${!isSelf ? `
                    <div class="flex gap-2 w-full max-w-xs">
                        <button onclick="toggleFollow('${p.id}', this)" class="flex-1 py-2 rounded-full font-bold transition-all ${p.isFollowing ? 'bg-gray-200 text-black' : 'bg-primary text-white'}">
                            ${p.isFollowing ? '已關注' : '關注'}
                        </button>
                        ${p.isFollowing ? `<button onclick="initiateChat('${p.id}')" class="flex-1 py-2 rounded-full font-bold bg-green-500 text-white">發訊息</button>` : ''}
                    </div>
                ` : `
                    <button onclick="logout()" class="w-full max-w-xs py-2 rounded-full font-bold bg-red-500/10 text-red-500 border border-red-500/30">登出</button>
                `}
            `;
        }
    }

    async function toggleFollow(targetId, btn) {
        btn.disabled = true;
        const res = await api('toggleFollow', { userId: state.user.id, targetId: targetId });
        if(res.status === 'success') {
            btn.className = `flex-1 py-2 rounded-full font-bold transition-all ${res.isFollowing ? 'bg-gray-200 text-black dark:bg-gray-700 dark:text-white' : 'bg-primary text-white'}`;
            btn.innerText = res.isFollowing ? '已關注' : '關注';
            // 重新整理以顯示「發訊息」按鈕
            if(res.isFollowing) switchView('profile', {userId: targetId});
        }
        btn.disabled = false;
    }

    async function initiateChat(targetId) {
        showToast("正在建立聊天室...");
        const res = await api('createChat', { type: 'personal', userId: state.user.id, targetId: targetId });
        if(res.status === 'success') {
            state.chats.push({id: res.chatId}); // 暫存
            switchView('chatroom', { chat: {id: res.chatId, type: 'personal'} });
        } else {
            showToast(res.message, 'error');
        }
    }

    // 6. 聊天列表 (ChatList)
    async function renderChatList(container) {
        container.innerHTML = `
            <div class="p-6 flex flex-col h-full">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">訊息</h2>
                    <button onclick="showCreateGroup()" class="p-2 glass rounded-full text-primary"><i class="ph ph-users-three"></i></button>
                </div>
                <div id="chatListContainer" class="flex-1 overflow-y-auto space-y-2">
                    <p class="text-center text-gray-500">載入中...</p>
                </div>
            </div>
        `;
        const res = await api('getChats', { userId: state.user.id });
        if(res.status === 'success') {
            state.chats = res.data;
            const cl = document.getElementById('chatListContainer');
            if(state.chats.length === 0) cl.innerHTML = '<p class="text-center text-gray-500">尚未有聊天紀錄</p>';
            else {
                cl.innerHTML = state.chats.map(c => `
                    <div class="glass p-3 rounded-2xl flex items-center gap-4 cursor-pointer hover:bg-black/5" onclick='enterChat(${JSON.stringify(c)})'>
                        <img src="${c.avatar}" class="w-14 h-14 rounded-full object-cover">
                        <div class="flex-1 truncate">
                            <p class="font-bold">${c.name || '聊天室'}</p>
                            <p class="text-xs text-gray-500 truncate">點擊進入聊天室</p>
                        </div>
                    </div>
                `).join('');
            }
        }
    }

    function enterChat(chatObj) {
        switchView('chatroom', { chat: chatObj });
    }

    // 群組創建功能 (簡化展示)
    function showCreateGroup() {
        showToast("群組功能：需指定好友 ID，此為簡化流程", "info");
        const name = prompt("請輸入群組名稱");
        if(name) {
            // 實務上這裡應開啟選擇好友的 Modal，為符合限制先以 prompt 代替
            api('createChat', { type: 'group', name: name, userId: state.user.id, members: [] }).then(res=>{
                if(res.status==='success') switchView('chatlist');
            });
        }
    }

    // 7. 聊天室 (ChatRoom)
    function renderChatRoom(container, chat) {
        state.activeChat = chat;
        
        // 自訂主題背景
        let bgStyle = chat.bgImage ? `background-image: url('${chat.bgImage}'); background-size: cover;` : '';
        let themeColor = chat.themeColor || '#3b82f6';

        container.innerHTML = `
            <div class="flex flex-col h-full relative" style="${bgStyle}">
                <!-- 遮罩以確保文字可讀 -->
                <div class="absolute inset-0 bg-white/50 dark:bg-black/50 z-0"></div>
                
                <!-- 頂部 -->
                <div class="glass flex items-center justify-between px-4 py-3 z-10 sticky top-0" style="border-bottom-color: ${themeColor}">
                    <div class="flex items-center gap-3">
                        <button onclick="switchView('chatlist'); state.activeChat=null;" class="p-2"><i class="ph ph-caret-left text-xl"></i></button>
                        <img src="${chat.avatar}" class="w-10 h-10 rounded-full object-cover cursor-pointer" onclick="alert('可實作查看群組或對方主頁')">
                        <h3 class="font-bold truncate max-w-[150px]">${chat.name || '聊天室'}</h3>
                    </div>
                    <button onclick="alert('設定聊天室背景與顏色 (RGB)')" class="p-2"><i class="ph ph-dots-three-vertical text-xl"></i></button>
                </div>

                <!-- 訊息區域 -->
                <div id="messagesArea" class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 z-10 pb-24">
                    <p class="text-center text-xs text-gray-500">這就是聊天的起點</p>
                </div>

                <!-- 底部輸入區 (液態玻璃橢圓) -->
                <div class="fixed bottom-4 left-1/2 transform -translate-x-1/2 w-[95%] max-w-[500px] glass rounded-[40px] flex items-center px-2 py-2 z-20">
                    <button class="p-2 text-gray-500 hover:text-primary"><i class="ph ph-paperclip text-xl"></i></button>
                    <button class="p-2 text-gray-500 hover:text-primary"><i class="ph ph-microphone text-xl"></i></button>
                    <button class="p-2 text-gray-500 hover:text-primary" onclick="document.getElementById('c_photo').click()"><i class="ph ph-image text-xl"></i></button>
                    <input type="file" id="c_photo" class="hidden" accept="image/*" onchange="sendMedia(this)">
                    
                    <input id="msgInput" type="text" placeholder="輸入訊息..." class="flex-1 bg-transparent px-3 py-2 focus:outline-none" onkeypress="if(event.key==='Enter') sendMsg()">
                    <button onclick="sendMsg()" class="p-2 bg-primary text-white rounded-full ml-2 w-10 h-10 flex items-center justify-center"><i class="ph ph-paper-plane-right"></i></button>
                </div>
            </div>
        `;
        
        // 觸發一次立即獲取歷史訊息
        pollMessagesNow();
    }

    async function sendMsg() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text) return;
        input.value = '';
        
        appendMessage({ senderId: state.user.id, content: text, type: 'text' });
        
        await api('sendMessage', {
            chatId: state.activeChat.id, userId: state.user.id, content: text, type: 'text'
        });
    }

    function sendMedia(input) {
        if(input.files && input.files[0]) {
            showToast("圖片上傳中...");
            processImage(input.files[0], async (base64) => {
                await api('sendMessage', {
                    chatId: state.activeChat.id, userId: state.user.id, fileBase64: base64, fileName: input.files[0].name, type: 'image'
                });
            });
        }
    }

    function appendMessage(msg) {
        const area = document.getElementById('messagesArea');
        const isMe = msg.senderId === state.user.id;
        const div = document.createElement('div');
        div.className = `max-w-[75%] rounded-2xl px-4 py-2 ${isMe ? 'bg-primary text-white self-end rounded-br-none' : 'glass text-black dark:text-white self-start rounded-bl-none'}`;
        
        if (msg.type === 'image') {
            div.innerHTML = `<img src="${msg.content}" class="rounded-lg max-w-full h-auto cursor-pointer" onclick="window.open(this.src)">`;
            div.className = `max-w-[75%] self-${isMe ? 'end' : 'start'}`; // 圖片去除背景
        } else {
            div.innerText = msg.content;
        }
        
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    // 8. 輪詢機制 (每3秒 + 抖動避免線程滿載)
    function startPolling() {
        if(state.pollInterval) clearInterval(state.pollInterval);
        
        const poll = async () => {
            if(!state.user) return clearInterval(state.pollInterval);
            
            // 加入 0~1000ms 隨機抖動 (Jitter) 避免同時發起請求超過 30 線程
            const delay = Math.random() * 1000; 
            await new Promise(r => setTimeout(r, delay));

            try {
                const chatIds = state.chats.map(c => c.id);
                if(state.activeChat && !chatIds.includes(state.activeChat.id)) chatIds.push(state.activeChat.id);
                
                if(chatIds.length === 0) return;

                const res = await api('pollMessages', {
                    userId: state.user.id, chatIds: chatIds, lastSync: state.lastSync
                });

                if(res.status === 'success' && res.data) {
                    state.lastSync = res.timestamp;
                    state.pollErrors = 0;

                    res.data.forEach(msg => {
                        if (msg.senderId !== state.user.id) {
                            if (state.currentView === 'chatroom' && state.activeChat?.id === msg.chatId) {
                                appendMessage(msg);
                            } else {
                                // 顯示上方橢圓 Toast
                                showToast(`新訊息: ${msg.content}`);
                                document.getElementById('msgBadge')?.classList.remove('hidden');
                            }
                        }
                    });
                }
            } catch (e) {
                state.pollErrors++;
                if(state.pollErrors > 5) console.warn("Polling fails repeatedly.");
            }
        };

        state.pollInterval = setInterval(poll, 3000);
    }

    async function pollMessagesNow() {
        const area = document.getElementById('messagesArea');
        area.innerHTML = '<p class="text-center text-xs text-gray-500">讀取歷史訊息...</p>';
        
        // 這裡可以做一個專門抓歷史紀錄的 API，目前為簡化直接用 poll 機制抓全部 (時間設0)
        const res = await api('pollMessages', {
            userId: state.user.id, chatIds: [state.activeChat.id], lastSync: new Date(0).toISOString()
        });
        
        if(res.status === 'success') {
            area.innerHTML = '';
            res.data.forEach(msg => appendMessage(msg));
            state.lastSync = res.timestamp; // 更新同步時間
        }
    }

    // 9. 設定畫面
    function renderSettings(container) {
        container.innerHTML = `
            <div class="p-6 h-full overflow-y-auto">
                <div class="flex items-center gap-4 mb-8">
                    <button onclick="switchView('profile')" class="p-2 glass rounded-full"><i class="ph ph-caret-left"></i></button>
                    <h2 class="text-2xl font-bold">帳戶與隱私</h2>
                </div>
                
                <div class="space-y-4">
                    <div class="glass p-4 rounded-2xl flex justify-between items-center">
                        <span>公開個人檔案</span>
                        <input type="checkbox" checked class="toggle-checkbox w-6 h-6 rounded-full text-primary" onchange="alert('設定已儲存')">
                    </div>
                    <div class="glass p-4 rounded-2xl flex justify-between items-center">
                        <span>允許被標記 (@)</span>
                        <input type="checkbox" checked class="toggle-checkbox w-6 h-6 rounded-full" onchange="alert('設定已儲存')">
                    </div>
                    <div class="glass p-4 rounded-2xl flex justify-between items-center">
                        <span>允許被拉入群組</span>
                        <input type="checkbox" checked class="toggle-checkbox w-6 h-6 rounded-full" onchange="alert('設定已儲存')">
                    </div>
                    
                    <button class="w-full glass p-4 rounded-2xl text-left text-gray-500 flex justify-between">
                        <span>封鎖名單</span><i class="ph ph-caret-right"></i>
                    </button>
                    
                    <button onclick="if(confirm('確定要刪除帳號嗎？此動作無法復原。')) logout();" class="w-full glass p-4 rounded-2xl text-left text-red-500 flex justify-between mt-8 border border-red-500/30">
                        <span>刪除帳戶</span><i class="ph ph-warning"></i>
                    </button>
                </div>
            </div>
        `;
    }

    // 初始化
    window.onload = () => {
        if (loadAuth()) {
            switchView('home');
            startPolling();
        } else {
            switchView('login');
        }
    };
</script>
</body>
</html>
        <!-- Auth View -->

            <div id="login-box">
                <div class="logo-text" style="margin-bottom: 40px; font-size: 32px;">BaycarChat</div>
                <input type="email" id="li-email" class="input-box" placeholder="電子郵件">
                <input type="password" id="li-pass" class="input-box" placeholder="密碼">

                <p style="margin-top:25px; font-size:14px; color:var(--secondary-text);">沒有帳號？ <span style="color:var(--primary); font-weight:700; cursor:pointer;" onclick="switchAuth(false)">註冊</span></p>

            </div>
        </div>

        <!-- Main View -->
        <div id="view-main" class="view">
            <header>
                <span class="logo-text">BaycarChat</span>
                <i class="fa-solid fa-moon" onclick="toggleTheme()" style="cursor:pointer; font-size:20px;"></i>
            </header>
            <div id="main-content" class="content-area"></div>
            <nav>
                <div class="nav-item active" onclick="navTo('home', this)"><i class="fa-solid fa-comment-dots"></i></div>
                <div class="nav-item" onclick="navTo('search', this)"><i class="fa-solid fa-magnifying-glass"></i></div>
                <div class="nav-item" onclick="navTo('friends', this)"><i class="fa-solid fa-user-plus"></i></div>
                <div class="nav-item" onclick="navTo('profile', this)"><i class="fa-solid fa-user-gear"></i></div>
            </nav>
        </div>

        <!-- Chat Overlay -->
        <div id="view-chat" class="view chat-view">
            <header>
                <i class="fa-solid fa-chevron-left" onclick="closeChat()" style="cursor:pointer; font-size:22px;"></i>
                <div style="display:flex; align-items:center; gap:12px;">
                    <img id="chat-avatar" src="" class="avatar" style="width:32px; height:32px;">
                    <span id="chat-name">聊天中</span>
                </div>
                <i class="fa-solid fa-circle-info"></i>
            </header>

                <i class="fa-solid fa-paper-plane action-icon" onclick="sendMsg()"></i>
            </div>

        <input type="file" id="file-up" class="hidden" onchange="handleFile(this)">
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxgAMIlGt4ysOSY2i5B8DO5ybNgA9LVrPLcG51XkEhblzXyr9jsgdOQgbfXV3DJXFJ9wg/exec';
        const ONESIGNAL_ID = '697c9936-e24f-4a33-9c33-383211a948a9';
        
        let user = JSON.parse(localStorage.getItem('user')) || null;
        let token = localStorage.getItem('token') || null;
        let activeChat = null;
        let poll = null;
        let uploadType = '';

        async function api(data) {
            setLoader(30);
            data.uid = user?.uid; data.token = token;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                const json = await res.json();
                setLoader(100);
                return json;
            } catch(e) { setLoader(0); return { status:'error', message:'連線失敗' }; }
        }

        function setLoader(p) {
            document.getElementById('loader').style.width = p + '%';
            if(p === 100) setTimeout(() => document.getElementById('loader').style.width = '0%', 500);
        }

        // --- AUTH ---
        function switchAuth(toLogin) {
            document.getElementById('login-box').classList.toggle('hidden', !toLogin);
            document.getElementById('reg-box').classList.toggle('hidden', toLogin);
        }

        async function doLogin() {
            const email = document.getElementById('li-email').value;
            const pass = document.getElementById('li-pass').value;
            if(!email || !pass) return;
            const res = await api({ action: 'login', email, password: CryptoJS.SHA256(pass).toString() });
            if(res.status === 'success') {
                user = res.user; token = res.token;
                localStorage.setItem('user', JSON.stringify(user));
                localStorage.setItem('token', token);
                location.reload();
            } else alert(res.message);
        }

        async function doRegister() {
            const email = document.getElementById('rg-email').value;
            const real = document.getElementById('rg-real').value;
            const nick = document.getElementById('rg-nick').value;
            const pass = document.getElementById('rg-pass').value;
            if(!email || !real || !nick || !pass) return;
            const res = await api({ action: 'register', email, realName: real, nickname: nick, password: CryptoJS.SHA256(pass).toString() });
            if(res.status === 'success') { alert('註冊成功'); switchAuth(true); } else alert(res.message);
        }

        // --- NAV ---
        function navTo(tab, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            const box = document.getElementById('main-content');
            box.innerHTML = '';
            if(tab === 'home') renderHome();
            else if(tab === 'search') renderSearch();
            else if(tab === 'friends') renderFriends();
            else if(tab === 'profile') renderProfile();
        }

        async function renderHome() {
            const box = document.getElementById('main-content');
            box.innerHTML = '<div style="padding:20px 16px; font-weight:800; font-size:24px;">訊息</div>';
            const res = await api({ action: 'getFriends' });
            const list = res.friends?.filter(f => f.status === 'accepted') || [];
            if(list.length === 0) box.innerHTML += '<div class="empty"><i class="fa-regular fa-comment"></i><p>尚無對話</p></div>';
            list.forEach(f => {
                const d = document.createElement('div');
                d.className = 'user-item';
                d.innerHTML = `<img src="${f.avatarUrl || 'https://ui-avatars.com/api/?name='+f.nickname}" class="avatar"><div class="user-info"><div class="user-name">${f.nickname}</div><div class="user-bio">點擊開啟對話</div></div>`;
                d.onclick = () => openChat(f);
                box.appendChild(d);
            });
        }

        function renderSearch() {
            const box = document.getElementById('main-content');
            box.innerHTML = `
                <div style="padding:20px 16px;">
                    <div style="font-weight:800; font-size:24px; margin-bottom:20px;">搜尋</div>
                    <input type="text" id="q-in" class="input-box" placeholder="搜尋 Email 或暱稱..." style="border-radius:12px;">
                    <button class="btn-primary" style="border-radius:12px;" onclick="doSearch()">搜尋用戶</button>
                </div>
                <div id="q-res"></div>
            `;
        }

        async function doSearch() {
            const q = document.getElementById('q-in').value;
            if(!q) return;
            const res = await api({ action: 'searchUser', query: q });
            const box = document.getElementById('q-res');
            box.innerHTML = '';
            if(!res.users || res.users.length === 0) box.innerHTML = '<p style="text-align:center;color:#888;">找不到用戶</p>';
            res.users.forEach(u => {
                const d = document.createElement('div');
                d.className = 'user-item';
                d.innerHTML = `<img src="${u.avatarUrl || 'https://ui-avatars.com/api/?name='+u.nickname}" class="avatar"><div class="user-info"><div class="user-name">${u.nickname}</div></div><button class="btn-primary" style="width:auto;margin:0;padding:6px 12px;font-size:12px;" onclick="fOp('${u.uid}', 'send', this)">加好友</button>`;
                box.appendChild(d);
            });
        }

        async function renderFriends() {
            const box = document.getElementById('main-content');
            box.innerHTML = '<div style="padding:20px 16px; font-weight:800; font-size:24px;">好友管理</div>';
            const res = await api({ action: 'getFriends' });
            const friends = res.friends || [];
            const reqs = friends.filter(f => f.status === 'pending' && f.actionUid !== user.uid);
            const list = friends.filter(f => f.status === 'accepted');

            box.innerHTML += '<div style="padding:10px 16px; font-size:12px; font-weight:700; color:#888;">好友請求</div>';
            reqs.forEach(f => {
                const d = document.createElement('div');
                d.className = 'user-item';
                d.innerHTML = `<img src="${f.avatarUrl || 'https://ui-avatars.com/api/?name='+f.nickname}" class="avatar"><div class="user-info"><div class="user-name">${f.nickname}</div></div><div style="display:flex;gap:8px;"><button class="btn-primary" style="width:auto;margin:0;padding:6px 12px;background:#2ecc71;" onclick="fOp('${f.uid}', 'accept')">接受</button><button class="btn-primary" style="width:auto;margin:0;padding:6px 12px;background:#e74c3c;" onclick="fOp('${f.uid}', 'reject')">拒絕</button></div>`;
                box.appendChild(d);
            });
            box.innerHTML += '<div style="padding:20px 16px 10px; font-size:12px; font-weight:700; color:#888;">我的好友</div>';
            list.forEach(f => {
                const d = document.createElement('div');
                d.className = 'user-item';
                d.innerHTML = `<img src="${f.avatarUrl || 'https://ui-avatars.com/api/?name='+f.nickname}" class="avatar"><div class="user-info"><div class="user-name">${f.nickname}</div></div><button class="btn-primary" style="width:auto;margin:0;padding:6px 12px;background:none;border:1px solid #dbdbdb;color:#000;" onclick="fOp('${f.uid}', 'delete')">刪除</button>`;
                box.appendChild(d);
            });
        }

        async function fOp(tid, op, btn) {
            if(btn) btn.disabled = true;
            await api({ action: 'friendRequest', targetUid: tid, op });
            if(op === 'send') alert('請求已送出'); else renderFriends();
        }

        function renderProfile() {
            const box = document.getElementById('main-content');
            box.innerHTML = `
                <div class="profile-head">
                    <div class="avatar-edit" onclick="triggerUpload('avatar')">
                        <img src="${user.avatarUrl || 'https://ui-avatars.com/api/?name='+user.nickname}" class="avatar" style="width:100px; height:100px;">
                        <div class="cam-icon"><i class="fa-solid fa-camera"></i></div>
                    </div>
                    <div style="margin-top:20px;">
                        <input type="text" id="p-nick" class="input-box" style="text-align:center; font-weight:700; font-size:20px; border:none; background:none;" value="${user.nickname}">
                        <textarea id="p-bio" class="input-box" style="text-align:center; font-size:14px; border:none; background:none; resize:none;" placeholder="寫點簡介...">${user.bio || ''}</textarea>
                    </div>
                    <button class="btn-primary" style="width:auto; padding:10px 40px; border-radius:20px;" onclick="saveP()">儲存</button>
                </div>
                <div style="padding:10px;">
                    <div class="user-item" onclick="triggerUpload('bg')"><i class="fa-solid fa-image"></i> 自訂聊天背景</div>
                    <div class="user-item" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i> 深色模式</div>
                    <div class="user-item" onclick="logout()" style="color:#ed4956;"><i class="fa-solid fa-power-off"></i> 登出</div>
                </div>
            `;
        }

        async function saveP() {
            const nick = document.getElementById('p-nick').value;
            const bio = document.getElementById('p-bio').value;
            const res = await api({ action: 'updateProfile', nickname: nick, bio: bio });
            if(res.status === 'success') { user.nickname = nick; user.bio = bio; localStorage.setItem('user', JSON.stringify(user)); alert('儲存成功'); }
        }

        // --- CHAT ---
        function openChat(friend) {
            activeChat = friend;
            document.getElementById('view-chat').classList.add('active');
            document.getElementById('chat-name').innerText = friend.nickname;
            document.getElementById('chat-avatar').src = friend.avatarUrl || 'https://ui-avatars.com/api/?name='+friend.nickname;
            const box = document.getElementById('chat-msgs');
            box.innerHTML = '';
            if(user.bgUrl) box.style.backgroundImage = `url(${user.bgUrl})`;
            fetchMsgs();
            poll = setInterval(fetchMsgs, 3000);
        }

        function closeChat() {
            activeChat = null; clearInterval(poll);
            document.getElementById('view-chat').classList.remove('active');
        }

        async function fetchMsgs() {
            if(!activeChat) return;
            const res = await api({ action: 'getMessages', targetUid: activeChat.uid });
            const box = document.getElementById('chat-msgs');
            const isBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 100;
            box.innerHTML = '';
            res.messages.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg-wrap ${m.from === user.uid ? 'me' : 'other'}`;
                let content = m.text;
                if(m.type === 'image') content = `<img src="${m.mediaUrl}" onclick="window.open('${m.mediaUrl}')">`;
                div.innerHTML = `<div class="bubble">${content}</div>`;
                box.appendChild(div);
            });
            if(isBottom) box.scrollTop = box.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text || !activeChat) return;
            input.value = '';
            await api({ action: 'sendMessage', to: activeChat.uid, text, fromName: user.nickname, type: 'text' });
            fetchMsgs();
        }

        // --- FILE ---
        function triggerUpload(type) { uploadType = type; document.getElementById('file-up').click(); }
        async function handleFile(input) {
            const file = input.files[0]; if(!file) return;
            setLoader(30);
            const reader = new FileReader();
            reader.onload = async (e) => {
                const res = await api({ action: 'uploadFile', base64: e.target.result, filename: file.name });
                if(res.status === 'success') {
                    if(uploadType === 'avatar') { await api({ action: 'updateProfile', avatarUrl: res.url }); user.avatarUrl = res.url; }
                    else if(uploadType === 'bg') { await api({ action: 'updateProfile', bgUrl: res.url }); user.bgUrl = res.url; }
                    else if(uploadType === 'chat-img') { await api({ action: 'sendMessage', to: activeChat.uid, type: 'image', mediaUrl: res.url, fromName: user.nickname }); fetchMsgs(); }
                    localStorage.setItem('user', JSON.stringify(user));
                    if(uploadType !== 'chat-img') renderProfile();
                }
                setLoader(100);
            };
            reader.readAsDataURL(file);
        }

        function toggleTheme() {
            const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
        }

        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            const t = localStorage.getItem('theme'); if(t) document.body.setAttribute('data-theme', t);
            if(user && token) {
                document.getElementById('view-auth').classList.remove('active');
                document.getElementById('view-main').classList.add('active');
                navTo('home', document.querySelector('.nav-item'));
                window.OneSignal = window.OneSignal || [];
                OneSignal.push(() => { OneSignal.init({ appId: ONESIGNAL_ID }); OneSignal.setExternalUserId(user.uid); });
            }
        };
