<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaycarChat - 聊天應用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --bg-light: #f9fafb;
            --bg-white: #ffffff;
            --text-dark: #1f2937;
            --text-gray: #6b7280;
            --border-color: #e5e7eb;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        body.dark-mode {
            --bg-light: #1f2937;
            --bg-white: #111827;
            --text-dark: #f3f4f6;
            --text-gray: #d1d5db;
            --border-color: #374151;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .app-container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            overflow: hidden;
            display: flex;
        }

        .page {
            flex: 1;
            overflow-y: auto;
            display: none;
        }

        .page.active {
            display: flex;
            flex-direction: column;
        }

        /* 底部導航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        body.dark-mode .bottom-nav {
            background: rgba(17, 24, 39, 0.8);
        }

        .nav-item {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-item:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }

        .nav-item span {
            font-size: 12px;
            font-weight: 500;
        }

        .nav-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--danger-color);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        /* 頁面內容 */
        .page-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        /* 登入/註冊頁面 */
        .auth-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 400px;
        }

        .auth-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
            color: var(--text-dark);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-primary:disabled {
            background: var(--text-gray);
            cursor: not-allowed;
            transform: none;
        }

        /* 首頁 */
        .home-page {
            padding: 20px;
        }

        .home-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .home-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: bold;
        }

        .home-logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
        }

        .recommended-users {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .user-card {
            background: var(--bg-white);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-name {
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-dark);
        }

        .user-username {
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .btn-follow {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-follow:hover {
            background: var(--primary-dark);
        }

        .btn-follow.following {
            background: var(--text-gray);
        }

        /* 訊息頁面 */
        .chats-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
        }

        .chat-item {
            background: var(--bg-white);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            gap: 12px;
            align-items: center;
            position: relative;
        }

        .chat-item:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .chat-item.active {
            background: rgba(99, 102, 241, 0.1);
            border-left: 4px solid var(--primary-color);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .online-indicator {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--success-color);
            border: 2px solid white;
        }

        .online-indicator.offline {
            background: var(--text-gray);
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .chat-preview {
            font-size: 13px;
            color: var(--text-gray);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
        }

        .chat-time {
            font-size: 12px;
            color: var(--text-gray);
        }

        .chat-unread {
            background: var(--danger-color);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .chat-muted {
            opacity: 0.6;
        }

        .pin-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            color: var(--warning-color);
            font-size: 16px;
        }

        /* 聊天室頁面 */
        .chat-room-page {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            background: var(--bg-white);
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .chat-header-title {
            font-weight: 600;
            color: var(--text-dark);
        }

        .chat-header-subtitle {
            font-size: 12px;
            color: var(--text-gray);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
            cursor: pointer;
            overflow: hidden;
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-content {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message.own .message-content {
            align-items: flex-end;
        }

        .message-bubble {
            background: var(--primary-color);
            color: white;
            padding: 10px 14px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.own .message-bubble {
            background: var(--primary-color);
        }

        .message:not(.own) .message-bubble {
            background: var(--bg-light);
            color: var(--text-dark);
        }

        .message-time {
            font-size: 12px;
            color: var(--text-gray);
        }

        .message-status {
            font-size: 11px;
            color: var(--text-gray);
        }

        .message-media {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
        }

        .message-media.image {
            max-width: 200px;
            cursor: pointer;
        }

        .message-media.audio {
            width: 200px;
        }

        /* 訊息輸入框 */
        .message-input-area {
            background: var(--bg-white);
            padding: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 14px;
            resize: none;
            max-height: 100px;
            font-family: inherit;
        }

        .message-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .input-actions {
            display: flex;
            gap: 8px;
        }

        .input-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s ease;
            padding: 8px;
        }

        .input-btn:hover {
            transform: scale(1.2);
        }

        /* 搜尋頁面 */
        .search-page {
            padding: 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .search-results {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .search-result-item {
            background: var(--bg-white);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-result-item:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .search-result-info {
            flex: 1;
        }

        .search-result-name {
            font-weight: 600;
            color: var(--text-dark);
        }

        .search-result-username {
            font-size: 13px;
            color: var(--text-gray);
        }

        /* 個人主頁 */
        .profile-page {
            padding: 20px;
        }

        .profile-header {
            background: var(--bg-white);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--text-dark);
        }

        .profile-username {
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .profile-bio {
            font-size: 14px;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-item {
            background: rgba(99, 102, 241, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-gray);
        }

        .profile-actions {
            display: flex;
            gap: 10px;
        }

        .profile-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .profile-actions .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .profile-actions .btn-secondary {
            background: var(--border-color);
            color: var(--text-dark);
        }

        /* 通知中心 */
        .notifications-section {
            background: var(--bg-white);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
        }

        .section-title {
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .notification-item {
            padding: 12px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notification-content {
            flex: 1;
        }

        .notification-title {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .notification-text {
            font-size: 13px;
            color: var(--text-gray);
        }

        .notification-actions {
            display: flex;
            gap: 8px;
        }

        .notification-actions button {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .notification-actions .btn-accept {
            background: var(--success-color);
            color: white;
        }

        .notification-actions .btn-reject {
            background: var(--danger-color);
            color: white;
        }

        /* 加載指示 */
        .loading-indicator {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 2000;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateX(-50%) translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        .loading-indicator.show {
            display: block;
        }

        /* localStorage 警告 */
        .storage-warning {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            z-index: 3000;
            display: none;
        }

        .storage-warning.show {
            display: block;
        }

        .storage-warning h2 {
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .storage-warning p {
            color: var(--text-gray);
            margin-bottom: 20px;
        }

        .storage-warning button {
            padding: 10px 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .recommended-users {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }

            .profile-stats {
                grid-template-columns: repeat(3, 1fr);
            }

            .message-content {
                max-width: 85%;
            }
        }

        /* 滾動條 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-gray);
        }

        /* 虛擬滾動容器 */
        .virtual-scroll-container {
            height: 100%;
            overflow-y: auto;
            position: relative;
        }

        .virtual-scroll-content {
            position: relative;
        }

        .virtual-scroll-item {
            position: absolute;
            width: 100%;
            left: 0;
            right: 0;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-content">
            <!-- 登入/註冊頁面 -->
            <div id="authPage" class="page active">
                <div class="auth-page">
                    <div class="auth-container">
                        <div class="auth-title">🚀 BaycarChat</div>
                        
                        <!-- 登入表單 -->
                        <div id="loginForm">
                            <h3 style="margin-bottom: 20px; text-align: center; color: var(--text-dark);">登入</h3>
                            <div class="form-group">
                                <label class="form-label">電子郵件或用戶名稱</label>
                                <input type="text" id="loginEmail" class="form-input" placeholder="例: small0966">
                            </div>
                            <div class="form-group">
                                <label class="form-label">密碼</label>
                                <input type="password" id="loginPassword" class="form-input" placeholder="例: 9987">
                            </div>
                            <button class="btn btn-primary" onclick="handleLogin()">登入</button>
                            <div style="text-align: center; margin-top: 15px;">
                                <button class="btn" style="background: none; color: var(--primary-color); font-weight: 600;" onclick="showRegisterForm()">沒有帳號？立即註冊</button>
                            </div>
                        </div>

                        <!-- 註冊表單 -->
                        <div id="registerForm" style="display: none;">
                            <h3 style="margin-bottom: 20px; text-align: center; color: var(--text-dark);">✨ 加入 BaycarChat</h3>
                            <div class="form-group">
                                <label class="form-label">電子郵件</label>
                                <input type="email" id="registerEmail" class="form-input" placeholder="例: abcdefg@email.com">
                            </div>
                            <div class="form-group">
                                <label class="form-label">本名</label>
                                <input type="text" id="registerRealName" class="form-input" placeholder="例: 賴家豪">
                            </div>
                            <div class="form-group">
                                <label class="form-label">暱稱</label>
                                <input type="text" id="registerNickname" class="form-input" placeholder="例: 小賴賴">

            <!-- 首頁 -->
            <div id="homePage" class="page">
                <div class="page-content">
                    <div class="home-page">
                        <div class="home-header">
                            <div class="home-logo">
                                <span id="logoDisplay">🚀</span>
                                <span>BaycarChat</span>

                        <h2 style="margin-bottom: 20px; color: var(--text-dark);">推薦用戶</h2>

            <div id="chatsPage" class="page">
                <div class="page-content">
                    <div style="padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                        <h2 style="color: var(--text-dark);">訊息</h2>

            <!-- 搜尋頁面 -->
            <div id="searchPage" class="page">
                <div class="page-content">
                    <div class="search-page">
                        <div class="search-box">
                            <input type="text" id="searchInput" class="search-input" placeholder="搜尋用戶..." onkeyup="handleSearch()">
                        </div>
                        <div id="searchResults" class="search-results"></div>
                    </div>

            <!-- 個人主頁 -->
            <div id="profilePage" class="page">
                <div class="page-content">
                    <div class="profile-page">
                        <div class="profile-header">
                            <div class="profile-avatar">
                                <span id="profileAvatarDisplay">👤</span>
                            </div>
                            <div class="profile-name" id="profileName">用戶名稱</div>
                            <div class="profile-username" id="profileUsername">@username</div>
                            <div class="profile-bio" id="profileBio">個人簡介</div>
                            <div class="profile-stats">
                                <div class="stat-item">
                                    <div class="stat-value" id="profileFollowers">0</div>
                                    <div class="stat-label">粉絲</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value" id="profileFollowing">0</div>
                                    <div class="stat-label">關注</div>
                                </div>
                                <div class="stat-item">
                                    <div class="stat-value" id="profileNotifications">0</div>
                                    <div class="stat-label">通知</div>
                                </div>
                            </div>
                            <div class="profile-actions">
                                <button class="btn btn-primary" onclick="showEditProfileDialog()">編輯檔案</button>
                                <button class="btn btn-secondary" onclick="handleLogout()">登出</button>
                            </div>
                        </div>

                        <!-- 通知中心 -->
                        <div class="notifications-section">
                            <div class="section-title">🔔 通知</div>
                            <div id="notificationsList"></div>
                        </div>

                        <!-- 關注請求 -->
                        <div class="notifications-section">
                            <div class="section-title">⚠️ 關注請求</div>
                            <div id="followRequestsList"></div>
                        </div>

                        <!-- 設定 -->
                        <div class="notifications-section">
                            <div class="section-title">⚙️ 設定</div>
                            <div style="display: flex; flex-direction: column; gap: 10px;">
                                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                                    <input type="checkbox" id="publicProfile" onchange="updateProfileSetting()">
                                    <span>公開檔案</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                                    <input type="checkbox" id="allowTag" onchange="updateProfileSetting()">
                                    <span>允許被標記</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                                    <input type="checkbox" id="allowGroupInvite" onchange="updateProfileSetting()">
                                    <span>允許被拉進群組</span>
                                </label>
                                <button class="btn btn-secondary" onclick="showBlockedUsersDialog()">查看封鎖名單</button>

            <!-- 聊天室頁面 -->
            <div id="chatRoomPage" class="page">

                        <button class="input-btn" onclick="backToChats()" style="margin-right: 10px;">←</button>
                        <div class="chat-header-info">
                            <div class="chat-avatar" style="width: 40px; height: 40px;">
                                <span id="chatRoomAvatarDisplay">👤</span>
                            </div>
                            <div>
                                <div class="chat-header-title" id="chatRoomTitle">聊天室</div>
                                <div class="chat-header-subtitle" id="chatRoomSubtitle">線上</div>
                            </div>
                        </div>
                        <button class="input-btn" onclick="showChatRoomSettings()">⚙️</button>
                    </div>
                    <div id="messagesContainer" class="messages-container"></div>
                    <div class="message-input-area">
                        <div class="input-wrapper">
                            <textarea id="messageInput" class="message-input" placeholder="輸入訊息..." rows="1"></textarea>
                            <div class="input-actions">
                                <button class="input-btn" onclick="showMediaUploadDialog()">📎</button>
                                <button class="input-btn" onclick="startRecording()">🎤</button>
                            </div>
                        </div>
                        <button class="btn btn-primary" style="width: auto; padding: 10px 20px; border-radius: 20px;" onclick="sendMessage()">發送</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部導航 -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchPage('homePage')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>首頁</span>
            </div>
            <div class="nav-item" onclick="switchPage('searchPage')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 1h-8C6.12 1 5 2.12 5 3.5v17C5 21.88 6.12 23 7.5 23h8c1.38 0 2.5-1.12 2.5-2.5v-17C18 2.12 16.88 1 15.5 1zm-4 21c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4.5-4H7V4h9v14z"/></svg>
                <span>搜尋</span>
            </div>
            <div class="nav-item" onclick="switchPage('chatsPage')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                <span>訊息</span>
                <div class="nav-badge" id="unreadBadge" style="display: none;">0</div>
            </div>
            <div class="nav-item" onclick="switchPage('profilePage')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <span>我的</span>
            </div>
        </div>
    </div>

    <!-- 加載指示 -->
    <div class="loading-indicator" id="loadingIndicator">載入中...</div>

    <!-- localStorage 警告 -->
    <div class="storage-warning" id="storageWarning">
        <h2>⚠️ 需要啟用 localStorage</h2>
        <p>為了確保最佳體驗，請在瀏覽器設定中啟用 localStorage。</p>
        <button onclick="document.getElementById('storageWarning').classList.remove('show')">我已了解</button>
    </div>

    <script>
        // ==================== 全局變量 ====================
        const API_URL = 'https://script.google.com/macros/s/AKfycby6G3l3kJSCh3sbwdRV88PcRZmjFDiLzoeVVUG-EVVSHG4cs0KrVDRpJYTr06aUpycV-Q/exec'; // 替換為您的 Apps Script 部署 URL
        let currentUser = null;
        let currentChat = null;
        let currentPage = 'homePage';
        let allChats = [];
        let allMessages = {};
        let allUsers = {};
        let isRecording = false;
        let mediaRecorder = null;
        let recordedChunks = [];
        let verificationCode = '';

        // ==================== 初始化 ====================
        window.addEventListener('load', () => {
            checkLocalStorage();
            checkLoginStatus();
            loadLogo();
            autoLoadInitialData();
        });

        function checkLocalStorage() {
            try {
                localStorage.setItem('test', 'test');
                localStorage.removeItem('test');
            } catch (e) {
                document.getElementById('storageWarning').classList.add('show');
            }
        }

        function checkLoginStatus() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showMainApp();
            }
        }

        function loadLogo() {
            fetchAPI('getLogo', {}, (response) => {
                if (response.success && response.data.LogoUrl) {
                    document.getElementById('logoDisplay').innerHTML = `<img src="${response.data.LogoUrl}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">`;
                }
            });
        }

        // ==================== 自動載入初始資料 ====================
        async function autoLoadInitialData() {
            if (!currentUser) return;

            showLoading('正在載入資料...');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'getInitialData',
                        userId: currentUser.email
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // 儲存所有資料到 localStorage
                    localStorage.setItem('initialData', JSON.stringify(data.data));
                    localStorage.setItem('lastDataSync', Date.now().toString());

                    // 更新全局變量
                    allChats = data.data.chats || [];
                    allMessages = {};
                    
                    // 組織訊息
                    for (const chat of allChats) {
                        if (chat.type === 'personal') {
                            allMessages[chat.ChatId] = chat.messages || [];
                        } else {
                            allMessages[chat.GroupId] = chat.messages || [];
                        }
                    }

                    // 更新 UI
                    renderRecommendedUsers(data.data.recommendedUsers);
                    renderChatsList(allChats);
                    updateNotifications(data.data.notifications, data.data.followRequests);
                    updateOnlineStatus(data.data.onlineStatus);

                    hideLoading();
                } else {
                    hideLoading();
                    alert('載入資料失敗：' + data.message);
                }
            } catch (error) {
                hideLoading();
                console.error('載入初始資料失敗:', error);
            }
        }

        // ==================== 認證函數 ====================
        function showLoginForm() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        }

        function showRegisterForm() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        function generateVerificationCode() {
            verificationCode = Math.random().toString().slice(2, 8);
            document.getElementById('verificationCodeDisplay').textContent = verificationCode;
        }

        function handleLogin() {
            const emailOrUsername = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!emailOrUsername || !password) {
                alert('請填寫所有欄位');
                return;
            }

            showLoading('正在登入...');

            fetchAPI('login', {
                emailOrUsername,
                password
            }, (response) => {
                hideLoading();
                if (response.success) {
                    currentUser = response.data;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showMainApp();
                    autoLoadInitialData();
                } else {
                    alert('登入失敗：' + response.message);
                }
            });
        }

        function handleRegister() {
            const email = document.getElementById('registerEmail').value;
            const realName = document.getElementById('registerRealName').value;
            const nickname = document.getElementById('registerNickname').value;
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const inputCode = document.getElementById('verificationCode').value;
            const avatarFile = document.getElementById('registerAvatar').files[0];

            if (!email || !realName || !nickname || !username || !password || !inputCode) {
                alert('請填寫所有欄位');
                return;
            }

            if (inputCode !== verificationCode) {
                alert('驗證碼錯誤');
                return;
            }

            showLoading('正在註冊...');

            // 如果有頭像，先上傳
            if (avatarFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const base64 = e.target.result.split(',')[1];
                    registerUser(email, realName, nickname, username, password, base64);
                };
                reader.readAsDataURL(avatarFile);
            } else {
                registerUser(email, realName, nickname, username, password, '');
            }
        }

        function registerUser(email, realName, nickname, username, password, avatar) {
            fetchAPI('register', {
                email,
                realName,
                nickname,
                username,
                password,
                avatar
            }, (response) => {
                hideLoading();
                if (response.success) {
                    alert('註冊成功，請登入');
                    showLoginForm();
                    document.getElementById('loginEmail').value = email;
                } else {
                    alert('註冊失敗：' + response.message);
                }
            });
        }

        function handleLogout() {
            if (confirm('確定要登出嗎？')) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('initialData');
                currentUser = null;
                currentChat = null;
                location.reload();
            }
        }

        // ==================== UI 切換 ====================
        function showMainApp() {
            document.getElementById('authPage').style.display = 'none';
            switchPage('homePage');
        }

        function switchPage(pageName) {
            // 隱藏所有頁面
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });

            // 隱藏聊天室頁面
            document.getElementById('chatRoomPage').classList.remove('active');

            // 顯示選定頁面
            document.getElementById(pageName).classList.add('active');
            currentPage = pageName;

            // 更新導航
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });

            if (pageName === 'homePage') document.querySelectorAll('.nav-item')[0].classList.add('active');
            else if (pageName === 'searchPage') document.querySelectorAll('.nav-item')[1].classList.add('active');
            else if (pageName === 'chatsPage') document.querySelectorAll('.nav-item')[2].classList.add('active');
            else if (pageName === 'profilePage') document.querySelectorAll('.nav-item')[3].classList.add('active');

            // 載入頁面資料
            if (pageName === 'profilePage') {
                loadProfilePage();
            } else if (pageName === 'chatsPage') {
                renderChatsList(allChats);
            }
        }

        // ==================== 首頁函數 ====================
        function renderRecommendedUsers(users) {
            const container = document.getElementById('recommendedUsers');
            container.innerHTML = '';

            users.forEach(user => {
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div class="user-avatar">
                        ${user.avatar ? `<img src="${user.avatar}">` : user.nickname.charAt(0)}
                    </div>
                    <div class="user-name">${user.nickname}</div>
                    <div class="user-username">@${user.username}</div>
                    <button class="btn-follow" onclick="followUser('${user.email}')">關注</button>
                `;
                container.appendChild(card);
            });
        }

        function followUser(userId) {
            showLoading('正在發送關注請求...');

            fetchAPI('follow', {
                followerId: currentUser.email,
                followingId: userId
            }, (response) => {
                hideLoading();
                if (response.success) {
                    alert('關注請求已發送');
                } else {
                    alert('關注失敗：' + response.message);
                }
            });
        }

        // ==================== 訊息頁面函數 ====================
        function renderChatsList(chats) {
            const container = document.getElementById('chatsList');
            container.innerHTML = '';

            chats.forEach(chat => {
                const chatItem = document.createElement('div');
                chatItem.className = 'chat-item';
                
                const otherUser = chat.type === 'personal' ? chat.otherUser : chat;
                const lastMessage = chat.messages && chat.messages.length > 0 ? chat.messages[chat.messages.length - 1] : null;
                const isOnline = chat.type === 'personal' ? (chat.otherUser?.isOnline ? true : false) : false;
                const isMuted = chat.IsMuted || chat.isMuted;

                chatItem.innerHTML = `
                    <div class="chat-avatar" onclick="viewUserProfile('${otherUser.email || otherUser.GroupId}')">
                        ${otherUser.avatar ? `<img src="${otherUser.avatar}">` : (otherUser.nickname || otherUser.GroupName).charAt(0)}
                        <div class="online-indicator ${isOnline ? '' : 'offline'}"></div>
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">${otherUser.nickname || otherUser.GroupName}</div>
                        <div class="chat-preview">${lastMessage ? lastMessage.Content.substring(0, 30) : '暫無訊息'}</div>
                    </div>
                    <div class="chat-meta">
                        <div class="chat-time">${lastMessage ? formatTime(lastMessage.CreatedAt) : ''}</div>
                        ${isMuted ? '<div style="font-size: 16px;">🔇</div>' : ''}
                    </div>
                `;

                chatItem.onclick = () => enterChatRoom(chat);
                container.appendChild(chatItem);
            });
        }

        function enterChatRoom(chat) {
            currentChat = chat;
            document.getElementById('chatRoomPage').classList.add('active');
            document.getElementById(currentPage).classList.remove('active');

            const otherUser = chat.type === 'personal' ? chat.otherUser : chat;
            document.getElementById('chatRoomTitle').textContent = otherUser.nickname || otherUser.GroupName;
            document.getElementById('chatRoomAvatarDisplay').innerHTML = otherUser.avatar ? `<img src="${otherUser.avatar}">` : (otherUser.nickname || otherUser.GroupName).charAt(0);

            renderMessages(chat);
        }

        function renderMessages(chat) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';

            const chatId = chat.type === 'personal' ? chat.ChatId : chat.GroupId;
            const messages = allMessages[chatId] || [];

            messages.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.SenderId === currentUser.email ? 'own' : ''}`;

                let content = msg.Content;
                if (msg.Type === 'image') {
                    content = `<img src="${msg.MediaUrl}" class="message-media image">`;
                } else if (msg.Type === 'audio') {
                    content = `<audio controls class="message-media audio"><source src="${msg.MediaUrl}"></audio>`;
                } else if (msg.Type === 'video') {
                    content = `<video controls class="message-media" style="max-width: 200px;"><source src="${msg.MediaUrl}"></video>`;
                }

                messageDiv.innerHTML = `
                    <div class="message-avatar" onclick="viewUserProfile('${msg.SenderId}')" style="cursor: pointer;">
                        ${msg.SenderAvatar ? `<img src="${msg.SenderAvatar}">` : msg.SenderId.charAt(0)}
                    </div>
                    <div class="message-content">
                        <div class="message-bubble">${content}</div>
                        <div class="message-time">${formatTime(msg.CreatedAt)}</div>
                        ${msg.IsRead ? '<div class="message-status">✓ 已讀</div>' : ''}
                    </div>
                `;

                container.appendChild(messageDiv);
            });

            // 滾動到底部
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const content = document.getElementById('messageInput').value;

            if (!content.trim()) {
                alert('請輸入訊息');
                return;
            }

            showLoading('正在發送...');

            const chatId = currentChat.type === 'personal' ? currentChat.ChatId : currentChat.GroupId;
            const action = currentChat.type === 'personal' ? 'sendMessage' : 'sendGroupMessage';

            const payload = {
                action: action,
                [currentChat.type === 'personal' ? 'chatId' : 'groupId']: chatId,
                senderId: currentUser.email,
                content: content,
                type: 'text'
            };

            fetchAPI(action, payload, (response) => {
                hideLoading();
                if (response.success) {
                    document.getElementById('messageInput').value = '';
                    // 重新載入訊息
                    autoLoadInitialData();
                } else {
                    alert('發送失敗：' + response.message);
                }
            });
        }

        function backToChats() {
            currentChat = null;
            document.getElementById('chatRoomPage').classList.remove('active');
            document.getElementById(currentPage).classList.add('active');
        }

        // ==================== 搜尋函數 ====================
        function handleSearch() {
            const query = document.getElementById('searchInput').value;

            if (!query.trim()) {
                document.getElementById('searchResults').innerHTML = '';
                return;
            }

            showLoading('正在搜尋...');

            fetchAPI('searchUsers', { query }, (response) => {
                hideLoading();
                if (response.success) {
                    renderSearchResults(response.data);
                }
            });
        }

        function renderSearchResults(results) {
            const container = document.getElementById('searchResults');
            container.innerHTML = '';

            results.forEach(user => {
                const item = document.createElement('div');
                item.className = 'search-result-item';
                item.innerHTML = `
                    <div class="user-avatar" style="width: 50px; height: 50px;">
                        ${user.avatar ? `<img src="${user.avatar}">` : user.nickname.charAt(0)}
                    </div>
                    <div class="search-result-info">
                        <div class="search-result-name">${user.nickname}</div>
                        <div class="search-result-username">@${user.username}</div>
                    </div>
                    <button class="btn-follow" onclick="followUser('${user.email}')">關注</button>
                `;
                container.appendChild(item);
            });
        }

        // ==================== 個人主頁函數 ====================
        function loadProfilePage() {
            if (!currentUser) return;

            document.getElementById('profileName').textContent = currentUser.nickname;
            document.getElementById('profileUsername').textContent = '@' + currentUser.username;
            document.getElementById('profileBio').textContent = currentUser.bio || '暫無簡介';
            document.getElementById('profileAvatarDisplay').innerHTML = currentUser.avatar ? `<img src="${currentUser.avatar}">` : currentUser.nickname.charAt(0);

            // 獲取統計資訊
            fetchAPI('getUserProfile', { userId: currentUser.email }, (response) => {
                if (response.success) {
                    document.getElementById('profileFollowers').textContent = response.data.followers || 0;
                    document.getElementById('profileFollowing').textContent = response.data.following || 0;
                }
            });

            // 載入通知
            loadNotifications();
            loadFollowRequests();
        }

        function loadNotifications() {
            fetchAPI('getNotifications', { userId: currentUser.email }, (response) => {
                if (response.success) {
                    renderNotifications(response.data);
                }
            });
        }

        function renderNotifications(notifications) {
            const container = document.getElementById('notificationsList');
            container.innerHTML = '';

            if (notifications.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-gray); padding: 20px;">暫無通知</div>';
                return;
            }

            notifications.forEach(notif => {
                const item = document.createElement('div');
                item.className = 'notification-item';
                item.innerHTML = `
                    <div class="notification-content">
                        <div class="notification-title">${notif.Title}</div>
                        <div class="notification-text">${notif.Content}</div>
                    </div>
                    <button class="input-btn" onclick="deleteNotification('${notif.NotificationId}')">✕</button>
                `;
                container.appendChild(item);
            });
        }

        function loadFollowRequests() {
            fetchAPI('getFollowRequests', { userId: currentUser.email }, (response) => {
                if (response.success) {
                    renderFollowRequests(response.data);
                }
            });
        }

        function renderFollowRequests(requests) {
            const container = document.getElementById('followRequestsList');
            container.innerHTML = '';

            if (requests.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-gray); padding: 20px;">暫無關注請求</div>';
                return;
            }

            requests.forEach(req => {
                const item = document.createElement('div');
                item.className = 'notification-item';
                item.innerHTML = `
                    <div class="notification-content">
                        <div class="notification-title">${req.followerInfo?.nickname} 要求關注您</div>
                        <div class="notification-text">@${req.followerInfo?.username}</div>
                    </div>
                    <div class="notification-actions">
                        <button class="notification-actions btn-accept" onclick="respondFollowRequest('${req.RequestId}', true)">接受</button>
                        <button class="notification-actions btn-reject" onclick="respondFollowRequest('${req.RequestId}', false)">拒絕</button>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function respondFollowRequest(requestId, accept) {
            showLoading(accept ? '正在接受...' : '正在拒絕...');

            fetchAPI('respondToFollowRequest', {
                requestId,
                accept
            }, (response) => {
                hideLoading();
                if (response.success) {
                    loadFollowRequests();
                    autoLoadInitialData();
                }
            });
        }

        function deleteNotification(notificationId) {
            fetchAPI('deleteNotification', { notificationId }, (response) => {
                if (response.success) {
                    loadNotifications();
                }
            });
        }

        function updateNotifications(notifications, followRequests) {
            const unreadCount = (notifications || []).length + (followRequests || []).length;
            const badge = document.getElementById('unreadBadge');
            if (unreadCount > 0) {
                badge.textContent = unreadCount;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
        }

        function updateOnlineStatus(onlineStatus) {
            // 更新聊天列表中的線上狀態
            // 這部分會在下次渲染時自動應用
        }

        // ==================== 輔助函數 ====================
        function fetchAPI(action, data, callback) {
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action, ...data })
            })
            .then(response => response.json())
            .then(data => callback(data))
            .catch(error => {
                console.error('API 錯誤:', error);
                callback({ success: false, message: '網路錯誤' });
            });
        }

        function showLoading(message = '載入中...') {
            const indicator = document.getElementById('loadingIndicator');
            indicator.textContent = message;
            indicator.classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loadingIndicator').classList.remove('show');
        }

        function formatTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '剛剛';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分鐘前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小時前';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';

            return date.toLocaleDateString('zh-TW');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            document.querySelector('.theme-toggle').textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        }

            alert('用戶檔案：' + userId);

        function handleDeleteAccount() {
            if (confirm('確定要刪除帳戶嗎？此操作無法撤銷。')) {
                showLoading('正在刪除帳戶...');
                fetchAPI('deleteAccount', { userId: currentUser.email }, (response) => {
                    hideLoading();
                    if (response.success) {
                        alert('帳戶已刪除');
                        handleLogout();
                    }
                });
            }
        }

        }

        // 載入主題設定
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }
    </script>
